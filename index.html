<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>XploitOS | Secure Environment</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Inter','Segoe UI',system-ui,sans-serif; height:100vh; width:100vw; overflow:hidden;
      background:#0a0c0f; user-select:none; -webkit-tap-highlight-color:transparent;
      display:flex; flex-direction:column;
    }
    #desktop {
      position:relative; width:100%; height:100%;
      background: linear-gradient(135deg, rgba(10,14,20,0.55) 0%, rgba(10,14,20,0.35) 100%),
        url('https://www.kali.org/wallpapers/images/2020.4/kali-nova.png') center/cover no-repeat;
      background-color:#0a0e14; z-index:1; overflow:hidden;
    }
    /* Login overlay */
    #login-overlay {
      position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9);
      backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center;
      z-index:9999; color:#b0c7e0; font-family:'Fira Code',monospace;
    }
    .login-box {
      background:rgba(18,24,34,0.95); border:1px solid #2e405b; border-radius:10px;
      padding:2rem; width:380px; box-shadow:0 15px 40px rgba(0,0,0,0.8);
    }
    .login-box h2 { text-align:center; margin-bottom:1.5rem; color:#4f8bc9; font-weight:600; }
    .login-field { margin-bottom:1rem; }
    .login-field label { display:block; margin-bottom:0.3rem; font-size:0.8rem; color:#9bb5d4; }
    .login-field input {
      width:100%; padding:0.5rem; background:#0f1722; border:1px solid #334b6e;
      color:#b0f0a0; font-family:inherit; font-size:0.8rem; border-radius:4px;
      caret-color:#33ff33;
    }
    .login-btn {
      width:100%; padding:0.5rem; background:#1c2a3c; border:1px solid #3c5372;
      color:#e0ecff; font-size:0.8rem; border-radius:4px; cursor:pointer;
      transition:0.15s; margin-top:0.5rem;
    }
    .login-btn:hover { background:#2d4665; }
    .login-error { color:#ff6060; font-size:0.75rem; margin-top:0.5rem; text-align:center; }

    .desktop-icon {
      position:absolute; display:flex; flex-direction:column; align-items:center; justify-content:center;
      width:80px; height:90px; border-radius:4px; background:transparent; border:1px solid transparent;
      transition:background 0.18s, border-color 0.18s, transform 0.1s; cursor:grab;
      color:#cdd9e9; font-weight:500; font-size:0.7rem; text-align:center; letter-spacing:0.3px;
      padding:0.2rem; gap:0.25rem; text-shadow:0 1px 3px black;
    }
    .desktop-icon:hover {
      background:rgba(30,50,80,0.45); border-color:rgba(79,139,201,0.5);
      transform:translateY(-2px); backdrop-filter:blur(4px);
    }
    .desktop-icon:active { cursor:grabbing; }
    .icon-symbol {
      width:36px; height:36px; display:flex; align-items:center; justify-content:center;
      font-size:1.6rem; filter:drop-shadow(0 2px 4px black); opacity:0.95;
    }
    .icon-symbol svg { width:28px; height:28px; fill:#b0c7e0; }
    #top-bar {
      position:fixed; top:0; left:0; right:0; height:36px; background:rgba(8,12,18,0.92);
      backdrop-filter:blur(16px); display:flex; align-items:center; justify-content:space-between;
      padding:0 1rem; z-index:3000; border-bottom:1px solid rgba(74,144,226,0.2);
      box-shadow:0 2px 12px rgba(0,0,0,0.6); color:#d0ddec; font-size:0.8rem; font-weight:500;
    }
    .left-section { display:flex; align-items:center; gap:0.5rem; font-weight:600; letter-spacing:0.5px; color:#9bb5d4; }
    .shield-icon svg { width:20px; height:20px; fill:#4f8bc9; }
    .center-ip {
      background:rgba(20,30,45,0.5); padding:0.2rem 1rem; border-radius:20px;
      border:1px solid #314e70; color:#aac8ff; font-family:'Fira Code',monospace; font-size:0.75rem;
    }
    .right-uptime { display:flex; align-items:center; gap:0.3rem; color:#a0b9d6; font-family:monospace; font-size:0.75rem; }
    #windows-container {
      position:absolute; top:36px; left:0; width:100%; height:calc(100% - 36px); pointer-events:none; z-index:10;
    }
    .window {
      position:absolute; min-width:600px; min-height:400px; width:680px; height:460px;
      background:rgba(14,18,24,0.85); backdrop-filter:blur(20px); border-radius:8px;
      border:1px solid #263850; box-shadow:0 15px 35px rgba(0,0,0,0.8), 0 0 0 1px rgba(66,133,244,0.15);
      display:flex; flex-direction:column; pointer-events:auto; resize:both; overflow:hidden; color:#dbe4f0;
    }
    .window.active { border-color:#3f7bc0; box-shadow:0 18px 40px #000000dd, 0 0 0 1.5px #2d6eb0; }
    .window-header {
      display:flex; justify-content:space-between; align-items:center; background:rgba(8,12,18,0.8);
      padding:0.5rem 1rem; border-bottom:1px solid #1f3148; cursor:grab;
      font-weight:600; font-size:0.85rem; color:#b7cef0; border-radius:8px 8px 0 0;
    }
    .window-controls { display:flex; gap:0.4rem; }
    .win-btn {
      background:transparent; border:none; color:#8299bb; font-size:1.1rem; width:26px; height:26px;
      border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.15s;
    }
    .win-btn:hover { background:#2a3e5c; color:white; }
    .close-btn:hover { background:#b91c1c; color:white; }
    .window-content {
      flex:1; overflow:auto; background:rgba(0,0,0,0.25); font-family:'Fira Code','Courier New',monospace;
      font-size:0.8rem; padding:0; display:flex; flex-direction:column;
    }
    .terminal-body {
      background:rgba(8,12,16,0.65); backdrop-filter:blur(14px); color:#20c20e; padding:0.6rem;
      height:100%; overflow-y:auto; white-space:pre-wrap; font-family:inherit; font-size:0.8rem;
      display:flex; flex-direction:column;
    }
    .input-line { display:flex; align-items:center; margin-top:2px; }
    .prompt-text { color:#4caf92; font-weight:500; white-space:nowrap; }
    .cmd-input {
      background:transparent; border:none; color:#b0f0a0; font-family:inherit; font-size:0.8rem;
      outline:none; flex:1; caret-color:#33ff33; margin-left:4px;
    }
    .explorer-grid { display:flex; flex-wrap:wrap; gap:1rem; padding:0.8rem; }
    .file-item {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      width:85px; height:95px; background:rgba(24,34,46,0.6); border-radius:6px;
      cursor:pointer; border:1px solid #2f425e; backdrop-filter:blur(5px); transition:0.1s;
      padding:0.4rem; gap:0.3rem;
    }
    .file-item:hover { background:#26445e; }
    .file-icon { width:32px; height:32px; }
    .file-icon svg { width:100%; height:100%; }
    .file-name { font-size:0.65rem; color:#cdd9e9; text-align:center; word-break:break-all; }
    .process-table { width:100%; border-collapse:collapse; font-size:0.8rem; }
    .process-table th { text-align:left; padding:0.4rem; background:#1f2a3a; }
    .process-table td { padding:0.3rem; }
    button {
      background:#1c2a3c; border:1px solid #3c5372; color:#d9e6ff; padding:0.25rem 0.8rem;
      border-radius:3px; font-size:0.75rem; cursor:pointer; transition:0.15s;
    }
    button:hover { background:#2d4665; }
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background:#3a506e; border-radius:3px; }
  </style>
</head>
<body>
  <!-- Login overlay (se muestra al inicio) -->
  <div id="login-overlay">
    <div class="login-box">
      <h2>XploitOS</h2>
      <div class="login-field">
        <label>Usuario</label>
        <input type="text" id="login-user" placeholder="root" autofocus>
      </div>
      <div class="login-field">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="········">
      </div>
      <button class="login-btn" id="login-btn">Iniciar sesión</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <div id="top-bar" style="display:none;">
    <div class="left-section">
      <span class="shield-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12v4.7c0 4.5-3 8.7-7 9.85-4-1.15-7-5.35-7-9.85V6.3l7-3.12z"/></svg></span>
      <span>SECURE ENVIRONMENT</span>
    </div>
    <div class="center-ip" id="ip-display">--.---.---.---</div>
    <div class="right-uptime">
      <span>&#x2B06; <span id="uptime">00:00:00</span></span>
    </div>
  </div>
  <div id="desktop" style="display:none;"></div>
  <div id="windows-container" style="display:none;"></div>

  <script>
    (() => {
      const STORAGE_KEY = 'xploitOS_v12';
      const desktop = document.getElementById('desktop');
      const windowsContainer = document.getElementById('windows-container');
      const topBar = document.getElementById('top-bar');
      const loginOverlay = document.getElementById('login-overlay');
      const loginUser = document.getElementById('login-user');
      const loginPass = document.getElementById('login-pass');
      const loginBtn = document.getElementById('login-btn');
      const loginError = document.getElementById('login-error');

      // Credenciales esperadas (password en base64)
      const VALID_USER = 'dcvxk';
      const VALID_PASS_B64 = 'MTIzNHg='; // '1234x' en base64

      // Proceso de login
      function attemptLogin() {
        const user = loginUser.value.trim();
        const pass = loginPass.value;
        const passB64 = btoa(pass);
        if (user === VALID_USER && passB64 === VALID_PASS_B64) {
          loginOverlay.style.display = 'none';
          topBar.style.display = '';
          desktop.style.display = '';
          windowsContainer.style.display = '';
          initDesktop();
        } else {
          loginError.textContent = 'Credenciales incorrectas';
          loginPass.value = '';
          loginPass.focus();
        }
      }

      loginBtn.addEventListener('click', attemptLogin);
      loginPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });
      loginUser.focus();

      // Oculta todo hasta login exitoso
      topBar.style.display = 'none';
      desktop.style.display = 'none';
      windowsContainer.style.display = 'none';

      // ========== IP y Uptime ==========
      fetch('https://api.ipify.org?format=json')
        .then(r => r.json()).then(d => document.getElementById('ip-display').textContent = d.ip)
        .catch(() => document.getElementById('ip-display').textContent = 'IP no disponible');
      const startTime = Date.now();
      setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('uptime').textContent = 
          `${String(Math.floor(elapsed/3600)).padStart(2,'0')}:${String(Math.floor((elapsed%3600)/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
      }, 1000);

      const virtualFS = { Scripts: {} };
      async function loadScriptList() {
        try {
          const resp = await fetch('scripts/');
          if (!resp.ok) return;
          const html = await resp.text();
          const doc = new DOMParser().parseFromString(html, 'text/html');
          doc.querySelectorAll('a').forEach(a => {
            const name = a.textContent.trim();
            if (name.endsWith('.js')) virtualFS.Scripts[name] = { type: 'script' };
          });
        } catch (e) {}
      }

      const scriptInstances = new Map();
      const processes = [];
      let nextPid = 2000;

      function createProcess(name, terminalId) {
        const pid = nextPid++;
        const proc = { pid, name, status: 'running', terminalId, startedAt: new Date().toLocaleTimeString() };
        processes.push(proc);
        saveState();
        return proc;
      }

      function removeProcess(pid) {
        const idx = processes.findIndex(p => p.pid === pid);
        if (idx !== -1) processes.splice(idx, 1);
        saveState();
      }

      function getProcessByPid(pid) { return processes.find(p => p.pid === pid); }

      function killScriptInstance(scriptName) {
        const instance = scriptInstances.get(scriptName);
        if (instance) {
          if (instance.controller) instance.controller.abort();
          if (instance.process) {
            instance.process.status = 'stopped';
            removeProcess(instance.process.pid);
          }
          const win = document.getElementById(instance.windowId);
          if (win) win.remove();
          scriptInstances.delete(scriptName);
          saveState();
          return true;
        }
        return false;
      }

      function restartScriptInstance(scriptName) {
        const instance = scriptInstances.get(scriptName);
        if (instance) {
          if (instance.controller) instance.controller.abort();
          const controller = new AbortController();
          instance.controller = controller;
          if (instance.process) {
            instance.process.status = 'running';
            instance.process.startedAt = new Date().toLocaleTimeString();
          }
          const win = document.getElementById(instance.windowId);
          if (win) {
            const termBody = win.querySelector('.terminal-body');
            const input = termBody?.querySelector('.cmd-input');
            if (termBody && input) {
              const logDiv = document.createElement('div');
              logDiv.textContent = `[PID ${instance.process.pid}] Reiniciando ${scriptName}...`;
              termBody.insertBefore(logDiv, input.parentElement);
              executeScriptInTerminal(scriptName, instance.windowId, termBody, input.parentElement);
            }
          }
          saveState();
          return true;
        }
        return false;
      }

      function saveState() {
        const state = {
          iconPositions: {},
          processes: processes.map(p => ({...p})),
          nextPid,
          windows: []
        };
        document.querySelectorAll('.desktop-icon').forEach(icon => {
          state.iconPositions[icon.dataset.action] = { left: icon.style.left, top: icon.style.top };
        });
        document.querySelectorAll('.window').forEach(w => {
          if (w.style.display !== 'none') {
            const headerSpan = w.querySelector('.window-header span');
            const termBody = w.querySelector('.terminal-body');
            let scriptName = null;
            if (headerSpan && headerSpan.textContent.includes('·')) {
              scriptName = headerSpan.textContent.split('·')[1].trim();
            }
            state.windows.push({
              id: w.id,
              left: w.style.left, top: w.style.top, width: w.style.width, height: w.style.height,
              title: headerSpan ? headerSpan.textContent : '',
              scriptName,
              terminalLog: termBody ? termBody.innerHTML : ''
            });
          }
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return {};
        try {
          const state = JSON.parse(saved);
          processes.length = 0;
          if (state.processes) { state.processes.forEach(sp => processes.push({...sp, status: 'stopped'})); nextPid = state.nextPid || 2000; }
          if (state.windows) {
            const restoredScripts = new Set();
            state.windows.forEach(ws => {
              if (ws.title.startsWith('Terminal')) {
                const script = ws.scriptName;
                const normalized = script ? script.toLowerCase() : null;
                if (normalized && restoredScripts.has(normalized)) return;
                if (normalized) restoredScripts.add(normalized);
                const { id } = createTerminalWindow(script, false, false);
                const win = document.getElementById(id);
                if (win) {
                  win.style.left = ws.left; win.style.top = ws.top;
                  win.style.width = ws.width; win.style.height = ws.height;
                  const termBody = win.querySelector('.terminal-body');
                  if (termBody && ws.terminalLog) {
                    termBody.innerHTML = ws.terminalLog;
                    const input = termBody.querySelector('.cmd-input');
                    if (input) setupTerminalInput(termBody, input, id);
                  }
                }
              } else if (ws.title === 'Scripts') {
                openScriptsFolder();
              } else if (ws.title === 'Administrador de procesos') {
                openProcessManager();
              }
            });
          }
          return state.iconPositions || {};
        } catch (e) {}
        return {};
      }

      window.addEventListener('beforeunload', saveState);
      setInterval(saveState, 5000);

      const defaultIconPositions = {
        'scripts-folder': { left: '50px', top: '50px' },
        'terminal': { left: '160px', top: '50px' },
        'process-manager': { left: '270px', top: '50px' },
        'file-explorer': { left: '380px', top: '50px' }
      };

      function createDesktopIcons(savedPositions = {}) {
        const icons = [
          { action: 'scripts-folder', label: 'Scripts', svg: '<svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>' },
          { action: 'terminal', label: 'Terminal', svg: '<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10zm-2-1h-6v-2h6v2zM7.5 17l-1.41-1.41L8.67 13l-2.58-2.59L7.5 9l4 4-4 4z"/></svg>' },
          { action: 'process-manager', label: 'Procesos', svg: '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>' },
          { action: 'file-explorer', label: 'Explorador', svg: '<svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V6h5.17l2 2H20v10zm-2-6H6v-2h12v2zm-4 4H6v-2h8v2z"/></svg>' }
        ];
        icons.forEach(icon => {
          const pos = savedPositions[icon.action] || defaultIconPositions[icon.action];
          const div = document.createElement('div');
          div.className = 'desktop-icon';
          div.dataset.action = icon.action;
          div.style.left = pos.left; div.style.top = pos.top;
          div.innerHTML = `<span class="icon-symbol">${icon.svg}</span><span>${icon.label}</span>`;
          desktop.appendChild(div);

          let isDragging = false, startX, startY, initialLeft, initialTop;
          div.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            e.preventDefault();
            isDragging = false;
            startX = e.clientX; startY = e.clientY;
            initialLeft = parseInt(div.style.left) || 0;
            initialTop = parseInt(div.style.top) || 0;
            div.style.cursor = 'grabbing';
            const onMove = (e) => {
              isDragging = true;
              div.style.left = (initialLeft + e.clientX - startX) + 'px';
              div.style.top = (initialTop + e.clientY - startY) + 'px';
            };
            const onUp = () => {
              document.removeEventListener('mousemove', onMove);
              document.removeEventListener('mouseup', onUp);
              div.style.cursor = 'grab';
              if (!isDragging) handleIconAction(icon.action);
              else saveState();
            };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
          });
        });
      }

      function handleIconAction(action) {
        if (action === 'scripts-folder') openScriptsFolder();
        else if (action === 'terminal') createTerminalWindow();
        else if (action === 'process-manager') openProcessManager();
        else if (action === 'file-explorer') openScriptsFolder();
      }

      let zIndex = 100;
      function bringToFront(win) {
        zIndex++;
        win.style.zIndex = zIndex;
        document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
        win.classList.add('active');
        if (win.style.display === 'none') win.style.display = '';
      }

      function closeWindow(winId) {
        const win = document.getElementById(winId);
        if (!win) return;
        // No permitir cerrar el administrador de procesos
        if (win.querySelector('.window-header span')?.textContent.includes('Administrador de procesos')) return;
        if (win) {
          for (let [scriptName, instance] of scriptInstances.entries()) {
            if (instance.windowId === winId) {
              killScriptInstance(scriptName);
              break;
            }
          }
          if (document.getElementById(winId)) win.remove();
          saveState();
        }
      }

      function findScriptWindow(scriptName) {
        const normalized = scriptName.toLowerCase();
        return Array.from(document.querySelectorAll('.window')).find(w => {
          const span = w.querySelector('.window-header span');
          if (!span || !span.textContent.includes('·')) return false;
          const name = span.textContent.split('·')[1].trim().toLowerCase();
          return name === normalized;
        });
      }

      function createWindow(title, contentHtml, options = {}) {
        const id = 'w-' + Date.now() + Math.random().toString(36);
        const div = document.createElement('div');
        div.className = 'window';
        div.id = id;
        div.style.left = '120px'; div.style.top = '80px';
        const noClose = options.noClose || false;
        div.innerHTML = `
          <div class="window-header">
            <span>${title}</span>
            <div class="window-controls">
              <button class="win-btn minimize-btn">—</button>
              <button class="win-btn maximize-btn">□</button>
              ${noClose ? '' : '<button class="win-btn close-btn">✕</button>'}
            </div>
          </div>
          <div class="window-content" id="content-${id}">${contentHtml}</div>`;
        windowsContainer.appendChild(div);
        bringToFront(div);

        if (!noClose) {
          const closeBtn = div.querySelector('.close-btn');
          if (closeBtn) closeBtn.onclick = (e) => { e.stopPropagation(); closeWindow(id); };
        }
        div.querySelector('.minimize-btn').onclick = () => { div.style.display = 'none'; saveState(); };
        div.querySelector('.maximize-btn').onclick = () => {
          if (div.style.width === '100%') {
            div.style.width = '680px'; div.style.height = '460px';
            div.style.left = '120px'; div.style.top = '80px';
          } else {
            div.style.width = '100%'; div.style.height = 'calc(100% - 36px)';
            div.style.left = '0'; div.style.top = '36px';
          }
          saveState();
        };

        const header = div.querySelector('.window-header');
        header.addEventListener('mousedown', (e) => {
          if (e.target.tagName === 'BUTTON') return;
          bringToFront(div);
          const rect = div.getBoundingClientRect();
          const shiftX = e.clientX - rect.left;
          const shiftY = e.clientY - rect.top;
          const move = (ev) => {
            div.style.left = (ev.clientX - shiftX) + 'px';
            div.style.top = (ev.clientY - shiftY) + 'px';
          };
          const up = () => {
            document.removeEventListener('mousemove', move);
            document.removeEventListener('mouseup', up);
            saveState();
          };
          document.addEventListener('mousemove', move);
          document.addEventListener('mouseup', up);
        });
        div.addEventListener('mousedown', () => bringToFront(div));
        return { id, element: div };
      }

      function setupTerminalInput(termBody, input, winId) {
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const cmd = input.value.trim();
            if (cmd) {
              const newLine = document.createElement('div');
              newLine.textContent = `root@xploit:~# ${cmd}`;
              termBody.insertBefore(newLine, input.parentElement);
              input.value = '';
              const output = handleCommand(cmd, winId);
              if (output) {
                const outLine = document.createElement('div');
                outLine.textContent = output;
                termBody.insertBefore(outLine, input.parentElement);
              }
              termBody.scrollTop = termBody.scrollHeight;
              saveState();
            }
          }
        });
      }

      function openScriptTerminal(scriptName) {
        if (scriptInstances.has(scriptName)) {
          const instance = scriptInstances.get(scriptName);
          const win = document.getElementById(instance.windowId);
          if (win) { bringToFront(win); return { id: instance.windowId, element: win }; }
        }
        const existingWin = findScriptWindow(scriptName);
        if (existingWin) {
          bringToFront(existingWin);
          return { id: existingWin.id, element: existingWin };
        }
        return createTerminalWindow(scriptName, true, true);
      }

      function createTerminalWindow(scriptName = null, autoExecute = true, save = true) {
        if (scriptName && scriptInstances.has(scriptName)) {
          const instance = scriptInstances.get(scriptName);
          const win = document.getElementById(instance.windowId);
          if (win) { bringToFront(win); return { id: instance.windowId, element: win }; }
        }
        const title = scriptName ? `Terminal · ${scriptName}` : 'Terminal';
        const banner = `XploitOS [Versión 10.0.26200.8457]\n(c) Xploit Corporation. Todos los derechos reservados.\n`;
        const contentHtml = `
          <div class="terminal-body">
            <div>${banner}</div>
            <div class="input-line">
              <span class="prompt-text">root@xploit:~#</span>
              <input class="cmd-input" type="text" autofocus autocomplete="off" spellcheck="false">
            </div>
          </div>`;
        const { id, element } = createWindow(title, contentHtml);
        const termBody = element.querySelector('.terminal-body');
        const input = element.querySelector('.cmd-input');
        setupTerminalInput(termBody, input, id);

        if (scriptName && autoExecute) {
          if (!scriptInstances.has(scriptName)) {
            const proc = createProcess(scriptName, id);
            const controller = new AbortController();
            scriptInstances.set(scriptName, { process: proc, windowId: id, controller });
            const logDiv = document.createElement('div');
            logDiv.textContent = `[PID ${proc.pid}] Iniciando ${scriptName}...`;
            termBody.insertBefore(logDiv, input.parentElement);
            executeScriptInTerminal(scriptName, id, termBody, input.parentElement);
          } else {
            const logDiv = document.createElement('div');
            logDiv.textContent = `${scriptName} ya está en ejecución.`;
            termBody.insertBefore(logDiv, input.parentElement);
          }
        }
        if (save) saveState();
        return { id, element };
      }

      async function executeScriptInTerminal(scriptName, terminalId, termBody, insertBeforeNode) {
        const instance = scriptInstances.get(scriptName);
        if (!instance) return;
        const { controller } = instance;
        const signal = controller.signal;

        const log = (msg) => {
          if (signal.aborted) return;
          const div = document.createElement('div');
          div.textContent = msg;
          termBody.insertBefore(div, insertBeforeNode);
          termBody.scrollTop = termBody.scrollHeight;
        };

        try {
          const response = await fetch(`scripts/${scriptName}`);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const code = await response.text();
          const context = {
            signal,
            log: (...args) => log(args.join(' ')),
            error: (...args) => log('ERROR: ' + args.join(' ')),
            warn: (...args) => log('WARN: ' + args.join(' ')),
            sleep: (ms) => new Promise((resolve, reject) => {
              if (signal.aborted) return reject(new DOMException('Aborted', 'AbortError'));
              const timer = setTimeout(resolve, ms);
              signal.addEventListener('abort', () => { clearTimeout(timer); reject(new DOMException('Aborted', 'AbortError')); }, { once: true });
            })
          };
          const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
          const scriptFunc = new AsyncFunction('context', code);
          await scriptFunc(context);
        } catch (err) {
          if (err.name === 'AbortError') log('Script detenido.');
          else log(`Error: ${err.message}`);
        } finally {
          if (signal.aborted) scriptInstances.delete(scriptName);
        }
      }

      function handleCommand(cmd, winId) {
        const [command, arg] = cmd.split(' ');
        switch (command) {
          case 'help': return 'help | clear | ps | kill <pid> | start <script> | restart <pid>';
          case 'clear':
            const termBody = document.querySelector(`#content-${winId} .terminal-body`);
            if (termBody) termBody.querySelectorAll('div:not(.input-line)').forEach(d => d.remove());
            return null;
          case 'ps':
            return processes.length ? processes.map(p => `${p.pid} ${p.name} ${p.status}`).join('\n') : 'sin procesos';
          case 'kill':
            if (arg) {
              const pid = parseInt(arg);
              const proc = getProcessByPid(pid);
              if (proc) { killScriptInstance(proc.name); return `Proceso ${arg} detenido.`; }
            }
            return 'uso: kill <pid>';
          case 'start':
            if (arg && virtualFS.Scripts[arg]) { openScriptTerminal(arg); return `Iniciando ${arg}...`; }
            return 'script no encontrado';
          case 'restart':
            if (arg) {
              const pid = parseInt(arg);
              const proc = getProcessByPid(pid);
              if (proc && restartScriptInstance(proc.name)) return `PID ${arg} reiniciado.`;
            }
            return 'fallo al reiniciar';
          default: return 'comando desconocido';
        }
      }

      function openScriptsFolder() {
        let html = '<div class="explorer-grid">';
        const scripts = virtualFS.Scripts;
        if (Object.keys(scripts).length === 0) {
          html += '<div style="color:#aaa;">Carpeta vacía (coloque .js en /scripts)</div>';
        } else {
          for (let f in scripts) {
            html += `
              <div class="file-item" data-script="${f}">
                <div class="file-icon">
                  <svg viewBox="0 0 32 32"><rect width="32" height="32" rx="4" fill="#f7df1e"/><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">JS</text></svg>
                </div>
                <div class="file-name">${f}</div>
              </div>`;
          }
        }
        html += '</div>';
        const { id, element } = createWindow('Scripts', html);
        element.querySelectorAll('.file-item').forEach(item => {
          item.addEventListener('dblclick', () => openScriptTerminal(item.dataset.script));
        });
      }

      let processManagerInterval = null;
      function openProcessManager() {
        if (document.getElementById('process-manager-window')) return;
        const { id, element } = createWindow('Administrador de procesos', '<div id="process-table-container"></div>', { noClose: true });
        element.id = 'process-manager-window';
        const updateTable = () => {
          const container = document.getElementById('process-table-container');
          if (!container) return;
          let html = '<table class="process-table"><tr><th>PID</th><th>Script</th><th>Estado</th><th>Acción</th></tr>';
          processes.forEach(p => {
            html += `<tr><td>${p.pid}</td><td>${p.name}</td><td>${p.status}</td>
              <td><button class="kill-proc" data-pid="${p.pid}">Detener</button>
              <button class="restart-proc" data-pid="${p.pid}">Reiniciar</button></td></tr>`;
          });
          html += '</table>';
          container.innerHTML = html;
          container.querySelectorAll('.kill-proc').forEach(btn => {
            btn.onclick = () => {
              const pid = parseInt(btn.dataset.pid);
              const proc = getProcessByPid(pid);
              if (proc) killScriptInstance(proc.name);
            };
          });
          container.querySelectorAll('.restart-proc').forEach(btn => {
            btn.onclick = () => {
              const pid = parseInt(btn.dataset.pid);
              const proc = getProcessByPid(pid);
              if (proc) restartScriptInstance(proc.name);
            };
          });
        };
        updateTable();
        processManagerInterval = setInterval(updateTable, 1000);
        element.addEventListener('remove', () => clearInterval(processManagerInterval));
      }

      async function initDesktop() {
        await loadScriptList();
        const savedPositions = loadState();
        createDesktopIcons(savedPositions);
        // No abrimos terminal automáticamente
      }
    })();
  </script>
